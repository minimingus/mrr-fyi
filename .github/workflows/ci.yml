name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/mrr_fyi' }}
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY || 'placeholder' }}
          LS_STORE_ID: ${{ secrets.LS_STORE_ID || 'placeholder' }}
          LS_FEATURED_VARIANT_ID: ${{ secrets.LS_FEATURED_VARIANT_ID || 'placeholder' }}
          LS_VERIFIED_VARIANT_ID: ${{ secrets.LS_VERIFIED_VARIANT_ID || 'placeholder' }}
          LS_WEBHOOK_SECRET: ${{ secrets.LS_WEBHOOK_SECRET || 'placeholder' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'placeholder' }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
